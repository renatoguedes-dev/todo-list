<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="./dist/main.js"></script>
  <link rel="stylesheet" href="style.css">

  <title>Todo List</title>
</head>
<body>

  <header id="header" class="header">
    <h1>To-do List</h1>
  </header>

  <main id="main" class="main">

    <div class="sidebar" id="sidebar">
      <div>
        <ul>
          <li>Home</li>
          <li>Today</li>
          <li>This week</li>
          <li>Projects
            <ul class="li-projects">
              <li>Study</li>
              <li>Work</li>
              <li>Leisure</li>
            </ul>
          </li>
          <li>Post-it notes</li>
        </ul>
      </div>
      <div id="newTodoBtn" class="new-todo-button">+</div>
    </div>

    <div id="mainContent" class="main-content">

      <div id="content" class="content">
        <div class="left-content">
          <div class="checkbox"></div>
          <p>example of content</p>
        </div>
        <div class="right-content">
          <div class="detail">Details</div>
          <div class="due-date">Aug 30th</div>
          <div class="images">
            <img src="./dist/images/note-edit-outline.png" alt="edit icon">
            <img src="./dist/images/trash-can-outline.png" alt="trash can icon">
          </div>
        </div>
      </div>

    </div>

  </main>

  <footer class="footer">Copyright © Renato Guedes - 2022</footer>

  
</body>
</html>
